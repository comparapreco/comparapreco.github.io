
<!DOCTYPE html>

<html lang="pt-BR">
<head><link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Simulador de Economia Anual | Compara Preço</title>
<link href="../../assets/css/style.css" rel="stylesheet"/>
<style>
    .sim-container { max-width: 600px; margin: 40px auto; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
    .input-row { margin-bottom: 20px; }
    .input-row label { display: block; margin-bottom: 10px; font-weight: 700; }
    .input-row input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .result-box { margin-top: 30px; padding: 30px; background: var(--primary); color: white; border-radius: 15px; text-align: center; display: none; }
    .result-val { font-size: 32px; font-weight: 900; display: block; }
  </style>
<!-- Google tag (gtag.js) -->
<script async="" src="https://www.googletagmanager.com/gtag/js?id=G-P0X4Z9Y7B2"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-P0X4Z9Y7B2');
</script>
<script>
  // Rastreamento de cliques em afiliados
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[href*="mercadolivre.com"]').forEach(function(link) {
      link.addEventListener('click', function(e) {
        gtag('event', 'affiliate_click', {
          'event_category': 'engagement',
          'event_label': this.href,
          'link_url': this.href,
          'product_name': this.getAttribute('title') || this.innerText
        });
      });
    });
  });
</script>
<meta content="ca-pub-4896859041377751" name="google-adsense-account"/>
</head>
<body>
<header class="header"><div class="container"></div></header>
<main class="container">
<div class="sim-container">
<h1>💰 Quanto você pode economizar?</h1>
<p>Simule sua economia anual média utilizando o monitoramento do Compara Preço em vez de comprar pelo preço de tabela.</p>
<div style="margin-top: 30px;">
<div class="input-row">
<label>Gasto médio mensal em eletrônicos (R$)</label>
<input id="monthlySpend" placeholder="Ex: 500" type="number"/>
</div>
<div class="input-row">
<label>Quantas grandes compras faz por ano? (Celular, TV, etc)</label>
<input id="bigPurchases" placeholder="Ex: 2" type="number"/>
</div>
<button class="btn" onclick="calculate()" style="width: 100%; padding: 15px;">Calcular Economia Potencial</button>
</div>
<div class="result-box" id="result">
<span class="result-label">Sua economia anual estimada:</span>
<span class="result-val" id="savingsValue">R$ 0,00</span>
<p style="font-size: 12px; margin-top: 10px; opacity: 0.8;">Baseado na economia média de 22% registrada pelo Compara Preço em 2026.</p>
</div>
</div>
</main>
<script>
    function calculate() {
      const spend = document.getElementById('monthlySpend').value || 0;
      const big = document.getElementById('bigPurchases').value || 0;
      
      // Cálculo: 22% de economia média do Compara Preço
      const annualSavings = (spend * 12 * 0.22) + (big * 1500 * 0.22);
      
      document.getElementById('savingsValue').innerText = 'R$ ' + annualSavings.toLocaleString('pt-BR', {minimumFractionDigits: 2});
      document.getElementById('result').style.display = 'block';
    }
  </script>
</body>
</html>
