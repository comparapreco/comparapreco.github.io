name: 🤖 Radar de Preços (ROBÔ SUPREMO)
on:
  push:
    branches:
      - main
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:
    inputs:
      test_fail:
        description: 'Simular falha para teste de auto-cura'
        required: false
        default: 'false'
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 📦 Instalar Dependências
        run: pip install -r requirements.txt
      - name: 🤖 Execução do Pipeline com Auto-Cura
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_AFILIADO_ID: ${{ secrets.ML_AFILIADO_ID || 'vendas0nline' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TEST_FAIL: ${{ github.event.inputs.test_fail || 'false' }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/self_healing.py || (echo "Tentando segunda execução..." && sleep 10 && python scripts/self_healing.py)
          
          python scripts/generate_radar_index.py
          python scripts/generate_market_intelligence.py
          python scripts/generate_segmented_newsletter.py
          python scripts/editorial_automation.py
          python scripts/build_categories.py
          python scripts/generate_comparisons.py
          python scripts/generate_blog_posts.py
          python scripts/generate_product_intelligence.py
          python scripts/build_sitemap.py

      - name: 🚀 Publicação Automática (Git Push)
        run: |
          git config --global user.email "bot@radardeprecos.com"
          git config --global user.name "Radar-Bot"
          git add .
          if [[ -n $(git status -s) ]]; then
            git commit -m "🤖 [ROBÔ] Atualização Automática e Auto-Cura $(date +'%Y-%m-%d %H:%M')"
            # Estratégia definitiva: Pull com merge e prioridade para as mudanças locais em arquivos gerados
            git pull origin main --no-rebase --strategy-option=ours --no-edit || git pull origin main --rebase --no-edit
            for i in {1..3}; do
              git push origin main && break || (echo "Push falhou, tentando novamente em 5s..." && sleep 5)
            done
          fi
      - name: 📂 Configurar Pages
        uses: actions/configure-pages@v4
      - name: 📂 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    runs-on: ubuntu-latest
    needs: automation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy para Pages
        id: deployment
        uses: actions/deploy-pages@v4
