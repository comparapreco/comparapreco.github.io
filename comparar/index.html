<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Comparador de Produtos — Compara Preço</title>
    <meta content="Compare produtos lado a lado. Veja preços, especificações, prós e contras. Descubra qual é o melhor para você." name="description"/>
    <link href="https://comparapreco.github.io/comparar/" rel="canonical"/>
    <link href="/assets/css/style.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
    <meta content="ca-pub-4896859041377751" name="google-adsense-account"/>
</head>
<body>
    <!-- Header será injetado aqui -->
    <header class="header"></header>

    <section class="hero">
        <div class="container">
            <h1>⚖️ Comparador de Produtos</h1>
            <p>Compare produtos lado a lado. Veja preços, especificações, prós e contras. Descubra qual é o melhor para você.</p>
        </div>
    </section>

    <main class="container">
        <div class="search-section">
            <h2>🔍 Criar Comparação</h2>
            <div class="search-grid">
                <div class="search-input">
                    <label>Produto 1</label>
                    <input id="product1" placeholder="Ex: Samsung Galaxy A36" type="text"/>
                </div>
                <div class="vs-text">VS</div>
                <div class="search-input">
                    <label>Produto 2</label>
                    <input id="product2" placeholder="Ex: Xiaomi Redmi Note 13" type="text"/>
                </div>
            </div>
            <button class="compare-btn" onclick="createComparison()">Comparar Agora</button>
        </div>

        <h2>📊 Comparações Populares</h2>
        <div class="products-grid" id="comparisonsGrid">
            <!-- Comparações populares serão carregadas aqui via JavaScript -->
        </div>
    </main>

    <!-- Footer será injetado aqui -->
    <footer class="footer"></footer>

    <script src="/assets/js/app.js"></script>
    <script>
        function createComparison() {
            const p1 = document.getElementById('product1').value.trim().toLowerCase().replace(/\s+/g, '-');
            const p2 = document.getElementById('product2').value.trim().toLowerCase().replace(/\s+/g, '-');
            
            if (p1 && p2) {
                window.location.href = `/comparar/${p1}-vs-${p2}/`;
            }
        }

        document.getElementById('product1').addEventListener('keydown', e => {
            if (e.key === 'Enter') createComparison();
        });

        document.getElementById('product2').addEventListener('keydown', e => {
            if (e.key === 'Enter') createComparison();
        });
    </script>
</body>
</html>
