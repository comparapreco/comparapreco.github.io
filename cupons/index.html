<!DOCTYPE html>

<html lang="pt-BR">
<head><link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cupons e Códigos de Desconto — Radar de Preços</title>
<meta content="Cupons e códigos de desconto para Mercado Livre, Amazon, Magalu e outras lojas. Economize com cupons exclusivos." name="description"/>
<link href="https://radardeprecos.github.io/radar/cupons/" rel="canonical"/>
<link href="../assets/css/style.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<style>
    .hero { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; padding: 60px 0 40px; margin-bottom: 40px; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
    .hero p { opacity: 0.9; font-size: 1.1rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .filters { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--card); cursor: pointer; transition: all 0.3s; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .coupons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .coupon-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
    }
    .coupon-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: var(--primary); }
    .coupon-header { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; padding: 20px; }
    .coupon-store { font-size: 0.9rem; opacity: 0.9; margin-bottom: 5px; }
    .coupon-title { font-weight: 800; font-size: 1.2rem; }
    .coupon-content { padding: 20px; }
    .coupon-description { color: var(--text-light); margin-bottom: 15px; line-height: 1.6; }
    .coupon-code-section { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .coupon-code-label { font-size: 0.85rem; color: var(--text-light); margin-bottom: 8px; }
    .coupon-code { display: flex; gap: 8px; align-items: center; }
    .coupon-code-value { font-family: monospace; font-weight: 800; font-size: 1.1rem; flex: 1; }
    .copy-btn { padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.85rem; }
    .copy-btn.copied { background: #10b981; }
    .coupon-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-light); margin-bottom: 15px; }
    .coupon-actions { display: flex; gap: 8px; }
    .coupon-action-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--bg); border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; }
    .coupon-action-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .coupon-action-btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .coupon-action-btn.primary:hover { background: var(--primary-dark); }
    .badge { display: inline-block; background: #10b981; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
    .badge.limited { background: #ef4444; }
  </style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P0X4Z9Y7B2"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-P0X4Z9Y7B2');
</script>
<script>
  // Rastreamento de cliques em afiliados
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[href*="mercadolivre.com"]').forEach(function(link) {
      link.addEventListener('click', function(e) {
        gtag('event', 'affiliate_click', {
          'event_category': 'engagement',
          'event_label': this.href,
          'link_url': this.href,
          'product_name': this.getAttribute('title') || this.innerText
        });
      });
    });
  });
</script>
</head>
<body>
<header class="header">
<div class="container header-inner">
<a class="logo" href="../">📊 <strong>Radar de Preços</strong></a>
<div class="search-bar">
<input id="searchInput" placeholder="Buscar ofertas..." type="text"/>
</div>
<button id="themeToggle">🌙</button>
</div>
</header>
<section class="hero">
<div class="container">
<h1>🎟️ Cupons e Códigos de Desconto</h1>
<p>Cupons exclusivos para Mercado Livre, Amazon, Magalu e outras lojas. Economize ainda mais nas suas compras.</p>
</div>
</section>
<main class="container">
<div class="filters">
<button class="filter-btn active" data-filter="all">Todas as Lojas</button>
<button class="filter-btn" data-filter="mercado-livre">🛒 Mercado Livre</button>
<button class="filter-btn" data-filter="amazon">📦 Amazon</button>
<button class="filter-btn" data-filter="magalu">🏪 Magalu</button>
<button class="filter-btn" data-filter="shopee">🛍️ Shopee</button>
<button class="filter-btn" data-filter="aliexpress">🌐 AliExpress</button>
</div>
<div class="coupons-grid" id="couponsGrid">
<!-- Preenchido via JavaScript -->
</div>
</main>
<footer class="footer">
<div class="container">
<p>© 2026 Radar de Preços. Cupons e Descontos.</p>
<div class="footer-links">
<a href="../sobre/">Sobre</a>
<a href="../contato/">Contato</a>
<a href="../privacidade/">Privacidade</a>
<a href="../disclaimer/">Disclaimer</a>
</div>
</div>
</footer>
<script>
    const coupons = [
      {
        id: 1,
        store: 'Mercado Livre',
        filter: 'mercado-livre',
        title: 'R$ 50 de desconto em eletrônicos',
        description: 'Desconto de R$ 50 em compras acima de R$ 200 em eletrônicos',
        code: 'RADAR50',
        discount: 'R$ 50',
        minPurchase: 'R$ 200',
        validUntil: '30/06/2026',
        uses: 'Ilimitado',
        badge: 'Ativo'
      },
      {
        id: 2,
        store: 'Amazon',
        filter: 'amazon',
        title: '15% de desconto em primeira compra',
        description: 'Código exclusivo para primeira compra na Amazon',
        code: 'RADAR15',
        discount: '15%',
        minPurchase: 'Sem mínimo',
        validUntil: '31/05/2026',
        uses: 'Limitado',
        badge: 'Limitado'
      },
      {
        id: 3,
        store: 'Magalu',
        filter: 'magalu',
        title: 'Frete grátis em eletrônicos',
        description: 'Frete grátis em compras de eletrônicos acima de R$ 150',
        code: 'RADARFRETE',
        discount: 'Frete Grátis',
        minPurchase: 'R$ 150',
        validUntil: '30/06/2026',
        uses: 'Ilimitado',
        badge: 'Ativo'
      },
      {
        id: 4,
        store: 'Shopee',
        filter: 'shopee',
        title: 'R$ 30 de desconto',
        description: 'Desconto de R$ 30 em compras acima de R$ 100',
        code: 'RADAR30',
        discount: 'R$ 30',
        minPurchase: 'R$ 100',
        validUntil: '28/06/2026',
        uses: 'Ilimitado',
        badge: 'Ativo'
      },
      {
        id: 5,
        store: 'AliExpress',
        filter: 'aliexpress',
        title: '20% de desconto em tudo',
        description: 'Desconto de 20% em qualquer compra na AliExpress',
        code: 'RADAR20',
        discount: '20%',
        minPurchase: 'Sem mínimo',
        validUntil: '31/07/2026',
        uses: 'Ilimitado',
        badge: 'Ativo'
      },
      {
        id: 6,
        store: 'Mercado Livre',
        filter: 'mercado-livre',
        title: 'Cashback de 10% em livros',
        description: 'Ganhe 10% de cashback em compras de livros',
        code: 'RADARLIVRO',
        discount: '10% Cashback',
        minPurchase: 'Sem mínimo',
        validUntil: '15/06/2026',
        uses: 'Limitado',
        badge: 'Limitado'
      }
    ];

    function renderCoupons(filter = 'all') {
      const grid = document.getElementById('couponsGrid');
      const filtered = filter === 'all' ? coupons : coupons.filter(c => c.filter === filter);

      grid.innerHTML = filtered.map(coupon => `
        <div class="coupon-card">
          <div class="coupon-header">
            <div class="coupon-store">${coupon.store}</div>
            <div class="coupon-title">${coupon.title}</div>
          </div>
          <div class="coupon-content">
            <div class="coupon-description">${coupon.description}</div>
            <div class="coupon-code-section">
              <div class="coupon-code-label">Código do Cupom</div>
              <div class="coupon-code">
                <span class="coupon-code-value">${coupon.code}</span>
                <button class="copy-btn" onclick="copyCoupon('${coupon.code}', this)">Copiar</button>
              </div>
            </div>
            <div class="coupon-meta">
              <span>💰 ${coupon.discount}</span>
              <span>📅 Válido até ${coupon.validUntil}</span>
              <span class="badge ${coupon.badge === 'Limitado' ? 'limited' : ''}">${coupon.badge}</span>
            </div>
            <div class="coupon-actions">
              <button class="coupon-action-btn" onclick="alert('Redirecionando para ' + '${coupon.store}')">Usar Cupom</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function copyCoupon(code, btn) {
      navigator.clipboard.writeText(code);
      btn.textContent = 'Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar';
        btn.classList.remove('copied');
      }, 2000);
    }

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderCoupons(e.target.dataset.filter);
      });
    });

    // Tema
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
    });
    if (savedTheme === 'dark') document.getElementById('themeToggle').textContent = '☀️';

    // Busca
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = e.target.value.trim();
        if (q) window.location.href = `../?q=${encodeURIComponent(q)}`;
      }
    });

    // Render inicial
    renderCoupons();
  </script>
</body>
</html>
